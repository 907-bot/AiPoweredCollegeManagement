services:
  - type: web
    name: secureexam-api
    env: python
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromService:
          name: secureexam-db
          type: pserv
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: secureexam-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production

  - type: worker
    name: secureexam-worker
    env: python
    buildCommand: pip install -e .
    startCommand: celery -A app.tasks worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromService:
          name: secureexam-db
          type: pserv
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: secureexam-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: secureexam-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: secureexam-redis
          type: redis
          property: connectionString
    deploymentStrategy: Rolling

  - type: redis
    name: secureexam-redis
    ipAllowList: []

  - type: pserv
    name: secureexam-db
    env: docker
    databases:
      - name: secureexam
        databaseName: secureexam
        user: secureexam
